<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Método de Pago</title>

<link rel="stylesheet" href="pago.css">
<link rel="icon"
href="images/favicon.png">

</head>

<body class="pago-body">

<header class="header">

    <button
        class="btn-header btn-volver"
        onclick="volverCarrito()">

        ← Volver

    </button>

    <h1>Método de Pago</h1>

    <div></div>

</header>

<main class="contenedor">

<div class="caja">

    <!-- =========================
         TARJETA VISUAL
    ========================== -->
    <div class="tarjeta-preview" id="tarjetaPreview">

        <div class="chip">💳</div>

        <div class="numero" id="prevNumero">
            #### #### #### ####
        </div>

        <div class="fila">

            <div>
                <small>Titular</small>
                <div id="prevTitular">
                    NOMBRE APELLIDO
                </div>
            </div>

            <div>
                <small>Expira</small>
                <div id="prevFecha">
                    MM/AA
                </div>
            </div>

        </div>

        <img
            id="prevLogo"
            class="logo-tarjeta-preview">

    </div>

    <!-- =========================
         TITULO
    ========================== -->
    <h2>Agregar Tarjeta</h2>

    <!-- =========================
         NUMERO TARJETA
    ========================== -->
    <input
        type="text"
        id="tarjeta"
        placeholder="Número de tarjeta"
        maxlength="16"
        oninput="validarTarjeta()">

    <!-- =========================
         LOGO ABAJO
    ========================== -->
    <img
        id="logo-tarjeta"
        style="
            width:80px;
            margin:10px auto;
            display:block;
        ">

    <!-- =========================
         FECHA
    ========================== -->
    <input
        type="text"
        id="fecha"
        placeholder="MM/AA"
        maxlength="5"
        oninput="formatearFecha(this)">

    <!-- =========================
         CVC
    ========================== -->
    <input
        type="text"
        id="cvc"
        placeholder="Código de seguridad"
        maxlength="4">

    <!-- =========================
         TITULAR
    ========================== -->
    <input
        type="text"
        id="titular"
        placeholder="Titular"
        oninput="
            this.value=this.value.toUpperCase();
            actualizarTarjeta()
        ">

    <!-- =========================
         BOTONES
    ========================== -->
    <div class="botones">

        <button
            class="btn-crear"
            onclick="guardarTarjeta()">

            Pagar

        </button>

        <button
            class="btn-borrar"
            onclick="limpiar()">

            Borrar

        </button>

    </div>

</div>
</main>

<!-- =========================
     JS
========================== -->
<script src="pago.js"></script>

<!-- =========================
     AUDIO
========================== -->
<audio
    id="sound-success"
    src="sounds/approved.mp3"
    preload="auto">
</audio>

</body>
</html>
