<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pago realizado</title>

<link rel="stylesheet" href="confirmacion.css">
<link rel="icon"
href="images/favicon.png">

</head>

<body class="confirmacion-body">

<header class="header">
    <h1>Pago realizado</h1>
</header>

<main class="contenedor">

    <div class="caja">

        <!-- ICONO -->
        <div class="emoji-exito">🎉</div>

        <h2>✅ Pago exitoso</h2>
        <p>Tu compra fue realizada correctamente</p>

        <!-- FACTURA -->
        <div class="factura">

            <div class="titulo-factura">
                HEALTHLIFE4U - FACTURA DIGITAL
            </div>

            <hr>

            <h3>🧾 Detalle de compra</h3>

            <div id="lista-productos"></div>

            <hr>

            <p>
                <strong>Total pagado:</strong>
                Q<span id="total-pago"></span>
            </p>

            <hr>

            <p><strong>Código de pedido:</strong></p>

            <h3 id="codigo-pedido"></h3>

            <hr>

            <p>
                Gracias por comprar en
                <strong>HL4U</strong> 🛒
            </p>

        </div>

        <!-- BOTONES FUERA FACTURA -->
        <div class="acciones-factura">

          <button onclick="descargarFactura()" class="btn-descargar">
          📄 Descargar PDF
          </button>

            <button class="btn-crear" onclick="volverInicio()">
           🏠 Volver al inicio
          </button>

        </div>

    </div>

</main>

<!-- LIBRERIA PDF -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<!-- JS -->
<script src="factura.js"></script>

<!-- SONIDO -->
<audio
    id="sound-success"
    src="sounds/approved.mp3"
    preload="auto">
</audio>

</body>
</html>
