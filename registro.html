<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro - HL4U</title>
    <link rel="stylesheet" href="registro.css">
    <link rel="icon"
href="images/favicon.png">

<body>

<header class="header">

<button style="position:relative;z-index:9999"
        onclick="window.location.href='index.html'">
    ← Volver
</button>

    <h1>Registrarse</h1>

</header>
<main class="contenedor">

    <div class="caja">

        <h2>Crear Usuario</h2>

        <input type="text" id="usuario" placeholder="Nombre de usuario">

        <input type="email" id="email" placeholder="Correo electrónico">
        <p id="error-email" class="error"></p>

        <input type="password" id="password" placeholder="Contraseña">

<!-- DIRECCIÓN -->

<div class="grupo-input">

    <input
    type="text"
    id="direccion"
    placeholder="Ej: Colonia El Naranjo 12 avenida 4-56">

</div>

<!-- ZONA -->

<div class="grupo-input">


    <select id="zona">

        <option value="">
            Selecciona tu zona
        </option>

        <option>Zona 1</option>
        <option>Zona 2</option>
        <option>Zona 3</option>
        <option>Zona 4</option>
        <option>Zona 5</option>
        <option>Zona 6</option>
        <option>Zona 7</option>
        <option>Zona 8</option>
        <option>Zona 9</option>
        <option>Zona 10</option>
        <option>Zona 11</option>
        <option>Zona 12</option>
        <option>Zona 13</option>
        <option>Zona 14</option>
        <option>Zona 15</option>
        <option>Zona 16</option>
        <option>Zona 17</option>
        <option>Zona 18</option>
        <option>Zona 19</option>
        <option>Zona 20</option>
        <option>Zona 21</option>
        <option>Zona 22</option>

        <option>Zona 27</option>

        <option>Zona 30</option>

    </select>

</div>

<!-- TELÉFONO -->

<div class="grupo-input">

   

    
    <div class="telefono-box">

        <span class="codigo-pais">
            +502
        </span>

        <input
        type="text"
        id="telefono"
        maxlength="8"
        placeholder="12345678">

    </div>

</div>


        <div class="botones">
            <button class="btn-crear" onclick="crearUsuario()">Crear Usuario</button>
            <button class="btn-borrar" onclick="borrarDatos()">Borrar</button>
        </div>

    </div>

</main>

<script src="registro.js"></script>

</body>
</html>
