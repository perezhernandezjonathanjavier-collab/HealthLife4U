<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tu Carrito - HL4U</title>

    <link rel="stylesheet" href="carrito.css">
    <link rel="icon" href="images/favicon.png?v=1" type="image/png">
</head>

<body>

<header class="header">

    <button class="btn-header btn-volver"
        onclick="volverInicio()">
        ← Volver
    </button>

    <h1>🛒 Tu Carrito</h1>

    <button class="btn-header btn-pago"
        onclick="irPago()">
        + Método de pago
    </button>

</header>

<main class="contenedor-carrito">

    <div class="caja-carrito">

        <div id="lista-carrito"></div>

        <div class="resumen">

            <div class="metodo-box">
                <p>Método de pago</p>
                <h3 id="metodo-pago">
                    No agregado
                </h3>
            </div>

            <div class="total-box">
                <p>Total</p>
                <h2 id="total">
                    Q0.00
                </h2>
            </div>

        </div>

        <div class="botones">

            <button class="btn-pagar"
                onclick="finalizarCompra()">
                💳 Pagar ahora
            </button>

            <button class="btn-vaciar"
                onclick="vaciarCarrito()">
                🗑 Vaciar carrito
            </button>

        </div>

    </div>

</main>

<script src="Botones.js"></script>
<script src="carrito.js"></script>

<audio
    id="sound-success"
    src="sounds/approved.mp3"
    preload="auto">
</audio>

</body>
</html>
